services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data

  questdb:
    image: questdb/questdb:latest
    ports:
      - "9000:9000"
      - "8812:8812"
      - "9009:9009"
    environment:
      QDB_PG_USER: admin
      QDB_PG_PASSWORD: quest
      QDB_PG_DATABASE: qdb
    volumes:
      - questdb-data:/var/lib/questdb

volumes:
  redis-data:
  questdb-data:
