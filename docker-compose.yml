services:
  ibkr-rest-app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ibpython-ibkr-rest-app:latest
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      IBKR_HOST: ${IBKR_HOST:-host.docker.internal}
      IBKR_PORT: ${IBKR_PORT:-7497}
      IBKR_CLIENT_ID: ${IBKR_CLIENT_ID:-101}
      REDIS_URL: redis://redis:6379/0
      QUESTDB_HOST: questdb
      QUESTDB_PORT: 8812
      QUESTDB_USER: ${QUESTDB_USER:-admin}
      QUESTDB_PASSWORD: ${QUESTDB_PASSWORD:-quest}
      QUESTDB_DATABASE: ${QUESTDB_DATABASE:-qdb}
    depends_on:
      - redis
      - questdb

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data

  questdb:
    image: questdb/questdb:latest
    ports:
      - "9000:9000"
      - "8812:8812"
      - "9009:9009"
    environment:
      QDB_PG_USER: admin
      QDB_PG_PASSWORD: quest
      QDB_PG_DATABASE: qdb
    volumes:
      - questdb-data:/var/lib/questdb

volumes:
  redis-data:
  questdb-data:
