x-app-env: &app-env
  IBKR_HOST: ${IBKR_DOCKER_HOST:-host.docker.internal}
  IBKR_PORT: ${IBKR_DOCKER_PORT:-4001}
  IBKR_MARKET_DATA_LINES: ${IBKR_MARKET_DATA_LINES:-100}
  REDIS_URL: redis://redis:6379/0
  REDIS_PASSWORD: ${REDIS_PASSWORD:-}
  QUESTDB_HOST: questdb
  QUESTDB_PORT: 8812
  QUESTDB_WRITE_PORT: 9009
  QUESTDB_USER: ${QUESTDB_USER:-admin}
  QUESTDB_PASSWORD: ${QUESTDB_PASSWORD:-quest}
  QUESTDB_DATABASE: ${QUESTDB_DATABASE:-qdb}
  MYSQL_HOST: mysql
  MYSQL_PORT: 3306
  MYSQL_USER: ${MYSQL_USER:-root}
  MYSQL_PASSWORD: ${MYSQL_PASSWORD:-}
  MYSQL_DATABASE: ${MYSQL_DATABASE:-trading}
  MARKET_DATA_DB_BACKEND: ${MARKET_DATA_DB_BACKEND:-questdb}
  INDEX_SYNC_INTERVAL_SECONDS: ${INDEX_SYNC_INTERVAL_SECONDS:-86400}
  INDEX_COMPOSITION_PROVIDER: ${INDEX_COMPOSITION_PROVIDER:-}
  TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
  TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
  TELEGRAM_LOG_LEVEL: ${TELEGRAM_LOG_LEVEL:-WARNING}
  IBKR_REST_OHLCV_RATE_LIMIT_RETRY_DELAY_SECONDS: ${IBKR_REST_OHLCV_RATE_LIMIT_RETRY_DELAY_SECONDS:-60}
  IBKR_REST_OHLCV_RATE_LIMIT_RETRY_COUNT: ${IBKR_REST_OHLCV_RATE_LIMIT_RETRY_COUNT:-1}

x-app-depends: &app-depends
  redis:
    condition: service_healthy
  questdb:
    condition: service_started
  mysql:
    condition: service_healthy

services:
  ibkr-rest-app:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: ibpython-fastapi:latest
    init: true
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: true
    environment:
      <<: *app-env
      IBKR_CLIENT_ID: ${IBKR_API_CLIENT_ID:-101}
      IBKR_REST_APP_NAME: ${IBKR_REST_APP_NAME:-IBKRRestApp}
      IBKR_REST_CONNECT_ON_STARTUP: ${IBKR_REST_CONNECT_ON_STARTUP:-false}
      IBKR_REST_MARKET_DATA_TTL_SECONDS: ${IBKR_REST_MARKET_DATA_TTL_SECONDS:-5}
      IBKR_REST_MARKET_DATA_CACHE_MAXSIZE: ${IBKR_REST_MARKET_DATA_CACHE_MAXSIZE:-512}
    depends_on: *app-depends
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/v1/system/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    stop_grace_period: 30s
    restart: unless-stopped

  ibkr-scheduler:
    build:
      context: .
      dockerfile: Dockerfile.scheduler
    image: ibpython-scheduler:latest
    init: true
    env_file:
      - path: .env
        required: false
    environment:
      <<: *app-env
      IBKR_CLIENT_ID: ${IBKR_SCHEDULER_CLIENT_ID:-201}
      IBKR_REST_BASE_URL: ${IBKR_DOCKER_REST_BASE_URL:-http://ibkr-rest-app:8000}
    depends_on:
      <<: *app-depends
      ibkr-rest-app:
        condition: service_healthy
    stop_grace_period: 30s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    command:
      - sh
      - -c
      - |
        if [ -n "$$REDIS_PASSWORD" ]; then
          redis-server --appendonly yes --requirepass "$$REDIS_PASSWORD"
        else
          redis-server --appendonly yes
        fi
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "if [ -n \"$${REDIS_PASSWORD}\" ]; then redis-cli -a \"$${REDIS_PASSWORD}\" ping; else redis-cli ping; fi"]
      interval: 10s
      timeout: 5s
      retries: 5

  questdb:
    image: questdb/questdb:latest
    ports:
      - "9000:9000"
      - "8812:8812"
      - "9009:9009"
    environment:
      QDB_PG_USER: ${QUESTDB_USER:-admin}
      QDB_PG_PASSWORD: ${QUESTDB_PASSWORD:-quest}
      QDB_PG_DATABASE: ${QUESTDB_DATABASE:-qdb}
    volumes:
      - questdb-data:/var/lib/questdb

  mysql:
    image: mysql:8.4
    ports:
      - "3306:3306"
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: ${MYSQL_DATABASE:-trading}
      MYSQL_USER: ${MYSQL_APP_USER:-trading}
      MYSQL_PASSWORD: ${MYSQL_APP_PASSWORD:-trading}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  redis-data:
  questdb-data:
  mysql-data:
