x-app-env: &app-env
  IBKR_HOST: ${IBKR_DOCKER_HOST:-host.docker.internal}
  IBKR_PORT: ${IBKR_DOCKER_PORT:-4001}
  IBKR_MARKET_DATA_LINES: ${IBKR_MARKET_DATA_LINES:-100}
  REDIS_URL: ${REDIS_DOCKER_URL:-redis://redisinsight.novatradingtech.com:6379/0}
  REDIS_PASSWORD: ${REDIS_PASSWORD:-}
  QUESTDB_HOST: questdb
  QUESTDB_PORT: 8812
  QUESTDB_WRITE_PORT: 9009
  QUESTDB_USER: ${QUESTDB_USER:-admin}
  QUESTDB_PASSWORD: ${QUESTDB_PASSWORD:-quest}
  QUESTDB_DATABASE: ${QUESTDB_DATABASE:-qdb}
  MYSQL_HOST: mysql
  MYSQL_PORT: 3306
  MYSQL_USER: ${MYSQL_USER:-root}
  MYSQL_PASSWORD: ${MYSQL_PASSWORD:-}
  MYSQL_DATABASE: ${MYSQL_DATABASE:-trading}
  MARKET_DATA_DB_BACKEND: ${MARKET_DATA_DB_BACKEND:-questdb}
  INDEX_SYNC_INTERVAL_SECONDS: ${INDEX_SYNC_INTERVAL_SECONDS:-86400}
  INDEX_COMPOSITION_PROVIDER: ${INDEX_COMPOSITION_PROVIDER:-}
  TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
  TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
  TELEGRAM_LOG_LEVEL: ${TELEGRAM_LOG_LEVEL:-WARNING}
  IBKR_REST_OHLCV_RATE_LIMIT_RETRY_DELAY_SECONDS: ${IBKR_REST_OHLCV_RATE_LIMIT_RETRY_DELAY_SECONDS:-60}
  IBKR_REST_OHLCV_RATE_LIMIT_RETRY_COUNT: ${IBKR_REST_OHLCV_RATE_LIMIT_RETRY_COUNT:-1}

services:
  ibkr-rest-app:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: ibpython-fastapi:latest
    init: true
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: true
    environment:
      <<: *app-env
      IBKR_CLIENT_ID: ${IBKR_API_CLIENT_ID:-101}
      IBKR_REST_APP_NAME: ${IBKR_REST_APP_NAME:-IBKRRestApp}
      IBKR_REST_CONNECT_ON_STARTUP: ${IBKR_REST_CONNECT_ON_STARTUP:-true}
      IBKR_REST_MARKET_DATA_TTL_SECONDS: ${IBKR_REST_MARKET_DATA_TTL_SECONDS:-5}
      IBKR_REST_MARKET_DATA_CACHE_MAXSIZE: ${IBKR_REST_MARKET_DATA_CACHE_MAXSIZE:-512}
      IBKR_REST_REQUEST_TIMEOUT_SECONDS: ${IBKR_REST_REQUEST_TIMEOUT_SECONDS:-60}
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1024M
        reservations:
          cpus: "0.5"
          memory: 256M
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/v1/system/live"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    stop_grace_period: 30s
    restart: unless-stopped

  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    image: ibpython-mcp:latest
    init: true
    ports:
      - "${MCP_HTTP_HOST_PORT:-9685}:${MCP_HTTP_PORT:-9000}"
    env_file:
      - path: .env
        required: true
    environment:
      <<: *app-env
      MCP_HTTP_HOST: "0.0.0.0"
      MCP_HTTP_PORT: ${MCP_HTTP_PORT:-9000}
      MCP_API_KEY: ${MCP_API_KEY:-}
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.settimeout(3); s.connect(('127.0.0.1', 9000)); s.close()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    stop_grace_period: 15s
    restart: unless-stopped
